<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Entry</title>  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
    }

    /* ROTATE PHONE MESSAGE */
    .rotate-msg{
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:18px;
      z-index:999;
    }

    @media (orientation: landscape){
      .rotate-msg{
        display:none;
      }
    }

    /* SCREEN STYLE */
    .screen{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
      opacity:0;
      transition:opacity 1.5s ease-in-out;
    }

    .screen.active{
      opacity:1;
      z-index:1;
    }

    /* IMAGE FULL SCREEN */
    .screen img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
  </style></head><body>  <div class="rotate-msg">Rotate your phone 📱</div>  <!-- IMAGES -->  <div class="screen active" id="s1"><img src="img1.jpg"></div>
  <div class="screen" id="s2"><img src="img2.jpg"></div>
  <div class="screen" id="s3"><img src="img3.jpg"></div>
  <div class="screen" id="s4"><img src="img4.jpg"></div>
  <div class="screen" id="s5"><img src="img5.jpg"></div>
  <div class="screen" id="s6"><img src="img6.jpg"></div>  <script>
    let current = 1;

    function nextScreen(){
      document.getElementById("s"+current).classList.remove("active");
      current++;
      if(current <= 6){
        document.getElementById("s"+current).classList.add("active");
      }
    }

    /* TIMINGS */
    setTimeout(nextScreen, 2000);   // 1 → 2
    setTimeout(nextScreen, 4000);   // 2 → 3
    setTimeout(nextScreen, 6000);   // 3 → 4
    setTimeout(nextScreen, 9000);   // 4 → 5
    setTimeout(nextScreen, 12000);  // 5 → 6
  </script></body>
</html>
