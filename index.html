<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* SEARCH BAR */
.search-box {
    padding: 10px;
}

.search-box input {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    background: #1e1e1e;
    color: white;
    font-size: 16px;
}

/* CATEGORY BUTTONS */
.categories {
    display: flex;
    overflow-x: auto;
    padding: 10px;
}

.categories button {
    margin-right: 10px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #1db954;
    color: white;
    cursor: pointer;
    white-space: nowrap;
}

.categories button:hover {
    background: #17a44a;
}

/* SECTION */
.section {
    padding: 10px;
}

.section h2 {
    margin-bottom: 10px;
}

/* SONG CARDS */
.song-list {
    display: flex;
    overflow-x: auto;
}

.song-card {
    background: #1e1e1e;
    margin-right: 10px;
    border-radius: 10px;
    padding: 10px;
    min-width: 120px;
    text-align: center;
}

.song-card img {
    width: 100%;
    border-radius: 10px;
}

.song-card p {
    font-size: 14px;
    margin-top: 5px;
}
</style>

</head>

<body>

<div class="header">🎵 My Music</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="Search songs...">
</div>

<!-- CATEGORIES -->
<div class="categories">
    <button onclick="showCategory('kannada')">Kannada</button>
    <button onclick="showCategory('hindi')">Hindi</button>
    <button onclick="showCategory('english')">English</button>
    <button onclick="showCategory('other')">Others</button>
</div>

<!-- TRENDING -->
<div class="section">
    <h2>🔥 Trending</h2>
    <div class="song-list" id="songList">
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>Song 1</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>Song 2</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>Song 3</p>
        </div>
    </div>
</div>

<!-- NEW RELEASE -->
<div class="section">
    <h2>🆕 New Releases</h2>
    <div class="song-list">
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>New Song 1</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>New Song 2</p>
        </div>
    </div>
</div>

<script>
function showCategory(category) {
    let list = document.getElementById("songList");

    if (category === "kannada") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Kannada Song 1</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Kannada Song 2</p></div>`;
    }

    if (category === "hindi") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Hindi Song 1</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Hindi Song 2</p></div>`;
    }

    if (category === "english") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>English Song 1</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>English Song 2</p></div>`;
    }

    if (category === "other") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Other Song 1</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Other Song 2</p></div>`;
    }
}
</script>

</body>
</html>
