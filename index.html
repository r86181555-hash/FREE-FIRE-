<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK MUSIC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="profile">RH</div>
    <div>
        <p class="small">Welcome</p>
        <h3>RHK MUSIC</h3>
    </div>
</div>

<!-- CATEGORY -->
<div class="tabs">
    <div class="tab active">All</div>
    <div class="tab">Charts</div>
    <div class="tab">Music</div>
    <div class="tab">Radio</div>
</div>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search songs..." onkeyup="searchYT(this.value)">

<!-- TOP CHARTS -->
<div class="section">
    <h2>Top Charts</h2>
    <div class="row" id="charts">
        <!-- STATIC UI -->
        <div class="card">
            <img src="https://i.ytimg.com/vi/2Vv-BfVoq4g/mqdefault.jpg">
            <p>Kannada Top 50</p>
        </div>

        <div class="card">
            <img src="https://i.ytimg.com/vi/JGwWNGJdvx8/mqdefault.jpg">
            <p>Namma Bengaluru</p>
        </div>
    </div>
</div>

<!-- RESULTS -->
<div class="section">
    <h2>Search Results</h2>
    <div class="row" id="results"></div>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
    <div onclick="goHome()" class="active">🏠<p>Home</p></div>
    <div onclick="focusSearch()">🔍<p>Search</p></div>
    <div onclick="openFav()">❤️<p>Library</p></div>
</div>

<script src="script.js"></script>
</body>
</html>
