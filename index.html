<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK MUSIC | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0b0d] text-white font-sans overflow-x-hidden">

    <div id="login-overlay" class="fixed inset-0 z-[300] bg-black flex flex-col items-center justify-between p-10 transition-all duration-1000">
        <div class="mt-20 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter">RHK <span class="text-purple-600">MUSIC</span></h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-40 mt-3 font-bold">Bas Bajna Chahiye Gaana</p>
        </div>
        <div class="w-full max-w-sm space-y-4 mb-10">
            <button id="google-login-btn" class="w-full bg-white text-black h-16 rounded-full flex items-center justify-center gap-4 font-black text-lg active:scale-95 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6"> Continue with Google
            </button>
            <div class="relative mt-6">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-gray-500 font-bold">+91</span>
                <input type="tel" placeholder="Phone Number" class="w-full bg-[#121214] h-16 rounded-2xl pl-16 pr-6 border border-white/5 outline-none focus:border-purple-600 transition-all">
            </div>
        </div>
    </div>

    <div id="main-app" class="opacity-0 transition-opacity duration-700 pb-40">
        <header class="p-6 flex justify-between items-center">
            <div>
                <p id="greeting-text" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Good Morning,</p>
                <h2 id="user-display-name" class="text-2xl font-black tracking-tight">User</h2>
            </div>
            <div id="user-profile-img" class="w-12 h-12 rounded-full border-2 border-purple-600 bg-cover bg-center"></div>
        </header>

        <div class="px-6 mb-8">
            <div class="relative group">
                <input type="text" id="search-input" placeholder="Search artists, songs..." class="w-full bg-[#1a1a1c] h-16 rounded-2xl px-16 outline-none border border-white/5 focus:border-purple-600 transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-7 top-1/2 -translate-y-1/2 text-purple-500"></i>
            </div>
        </div>

        <main class="space-y-10 px-6">
            <section class="relative h-56 rounded-[2.5rem] overflow-hidden group shadow-2xl">
                <img id="featured-img" src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent p-8 flex flex-col justify-end">
                    <p class="text-[10px] font-black uppercase text-purple-400">Featured Artist</p>
                    <h3 class="text-3xl font-black italic mb-4">SZA</h3>
                    <button class="bg-purple-600 w-28 h-10 rounded-full text-[10px] font-black uppercase tracking-widest">Play Now</button>
                </div>
            </section>

            <section>
                <h3 class="text-xs font-black uppercase tracking-widest text-purple-500 mb-6">Your Daily Mixes</h3>
                <div id="daily-mix-container" class="flex gap-5 overflow-x-auto pb-4 no-scrollbar">
                    </div>
            </section>

            <section id="my-playlist-section">
                <h3 class="text-xs font-black uppercase tracking-widest text-purple-500 mb-6">Your Library</h3>
                <div id="personal-playlist" class="space-y-4">
                    </div>
            </section>
        </main>
    </div>

    <div id="player-bar" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] glass-premium rounded-[2.5rem] p-4 flex items-center justify-between translate-y-60 transition-all duration-500 border border-white/10 z-[200]">
        <div class="flex items-center gap-4 overflow-hidden">
            <img id="now-playing-thumb" src="" class="w-14 h-14 rounded-2xl object-cover shadow-2xl">
            <div class="overflow-hidden">
                <p id="now-playing-title" class="text-sm font-black truncate w-32"></p>
                <p class="text-[9px] text-purple-400 font-black uppercase tracking-widest animate-pulse">Playing</p>
            </div>
        </div>
        <div class="flex items-center gap-5 pr-2">
            <button id="prev-btn" class="text-gray-500 hover:text-white transition-colors"><i class="fa-solid fa-backward-step"></i></button>
            <button id="master-play-pause" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center text-xl active:scale-90 transition-transform">
                <i class="fa-solid fa-pause"></i>
            </button>
            <button id="next-btn" class="text-gray-500 hover:text-white transition-colors"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

    <div id="yt-player-hidden" style="display:none"></div>

    <script type="module" src="script.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
