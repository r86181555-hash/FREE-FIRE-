<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK MUSIC | PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0D0D0D] text-white font-['Plus_Jakarta_Sans'] overflow-x-hidden">

    <audio id="main-audio"></audio>

    <div id="name-modal" class="fixed inset-0 z-[200] bg-[#0D0D0D] flex items-center justify-center p-10 hidden">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-3xl font-extrabold mb-6">RHK Studio</h1>
            <input type="text" id="userNameInput" placeholder="Enter your name" 
                class="w-full bg-[#1A1A1A] border border-white/5 rounded-2xl py-5 px-6 mb-6 focus:outline-none focus:border-[#1DB954]">
            <button onclick="saveUser()" class="w-full bg-[#1DB954] text-black font-bold py-5 rounded-full">Enter Studio</button>
        </div>
    </div>

    <div class="max-w-md mx-auto min-h-screen relative pb-44">
        <header class="p-6 sticky top-0 bg-[#0D0D0D]/90 backdrop-blur-md z-40">
            <div class="flex justify-between items-center mb-6">
                <h2 id="user-display" class="text-xl font-bold italic text-[#1DB954]">RHK User</h2>
                <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <i class="fa-solid fa-music text-[10px] text-[#1DB954]"></i>
                </div>
            </div>

            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="text" id="searchInput" oninput="searchMusic()" placeholder="Search your library..." 
                    class="w-full bg-[#1A1A1A] border border-white/5 rounded-full py-4 pl-12 pr-6 text-sm focus:outline-none focus:border-[#1DB954]/50 transition-all">
            </div>
        </header>

        <main class="px-6">
            <section id="home-view">
                <h3 class="text-lg font-bold mb-4">Studio Collection</h3>
                <div id="home-grid" class="grid grid-cols-2 gap-4"></div>
            </section>

            <section id="library-view" class="hidden">
                <h3 class="text-2xl font-bold mb-6">Liked Songs</h3>
                <div id="library-list" class="space-y-4"></div>
            </section>
        </main>

        <div id="mini-player" class="fixed bottom-28 left-4 right-4 bg-[#1A1A1A] rounded-[2.5rem] p-4 z-50 transform translate-y-64 transition-all duration-500 shadow-2xl border border-white/5">
            <div class="flex items-center gap-4">
                <img id="player-thumb" src="" class="w-14 h-14 rounded-[1.5rem] object-cover bg-black">
                <div class="flex-1 overflow-hidden">
                    <p id="player-title" class="font-bold truncate text-sm">Select Track</p>
                    <p id="player-artist" class="text-[10px] text-gray-400">RHK Music</p>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-backward-step cursor-pointer text-gray-400" onclick="prevTrack()"></i>
                    <button id="masterPlay" class="w-10 h-10 bg-[#1DB954] rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-play text-black text-xs"></i>
                    </button>
                    <i class="fa-solid fa-forward-step cursor-pointer" onclick="nextTrack()"></i>
                </div>
            </div>
            <div class="px-2 mt-4">
                <input type="range" id="progress-bar" value="0" class="w-full h-1 bg-white/10 rounded-full appearance-none accent-[#1DB954]">
                <div class="flex justify-between text-[8px] text-gray-500 mt-2 font-bold uppercase tracking-widest">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 h-24 bg-[#0D0D0D]/95 border-t border-white/5 flex justify-around items-center z-40">
            <div onclick="showView('home')" class="nav-item active" id="btn-home">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Explore</span>
            </div>
            <div onclick="showView('library')" class="nav-item" id="btn-lib">
                <i class="fa-solid fa-heart text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Liked</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
