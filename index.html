<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK MUSIC | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-['Montserrat'] selection:bg-purple-500/30">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#050505] flex flex-col items-center justify-center px-10">
        <div class="text-4xl font-black tracking-tighter italic mb-10 text-center">
            RHK <span class="text-purple-500">MUSIC</span>
            <p class="text-[10px] not-italic font-bold tracking-[0.3em] text-white/40 mt-2 uppercase">Premium Experience</p>
        </div>
        <button id="btnGoogle" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-bold uppercase tracking-widest text-[11px] flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
            Continue with Google
        </button>
    </div>

    <div id="app-content" class="max-w-md mx-auto min-h-screen relative pb-44 bg-gradient-to-b from-[#1a1a2e] via-[#050505] to-black opacity-0 pointer-events-none transition-opacity duration-700">
        <header class="p-6 pb-4 sticky top-0 z-50 backdrop-blur-3xl border-b border-white/5">
            <div class="flex justify-between items-center mb-6">
                <div class="text-2xl font-black tracking-tighter italic">RHK <span class="text-purple-500">MUSIC</span></div>
                <div class="flex items-center gap-4">
                    <button id="btnLogout" class="text-[10px] font-bold text-white/30 uppercase">Logout</button>
                    <div id="user-avatar" class="w-10 h-10 bg-purple-600 rounded-full border-2 border-white/10 bg-cover"></div>
                </div>
            </div>
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                <input type="text" id="searchInput" placeholder="Search artists, songs..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-purple-500/50" onkeyup="if(event.key === 'Enter') searchMusic(this.value)">
            </div>
        </header>

        <main class="px-6">
            <section class="mb-10 pt-6">
                <h3 class="text-[10px] uppercase tracking-[0.4em] font-bold text-purple-500 mb-4 ml-1">Editor's Choice</h3>
                <div id="hero-section" class="premium-card relative h-56 rounded-[2.5rem] overflow-hidden flex items-end p-6 border border-white/10"></div>
            </section>
            <section class="mb-10">
                <h3 class="text-xl font-extrabold tracking-tight mb-5 px-1">Your Daily Mixes</h3>
                <div id="daily-mixes" class="flex gap-5 overflow-x-auto no-scrollbar pb-4 pt-2"></div>
            </section>
        </main>

        <div id="player"></div>

        <div id="mini-player" class="fixed bottom-28 left-1/2 -translate-x-1/2 w-[94%] glass-player p-4 rounded-[2.5rem] flex items-center gap-4 z-50 transform translate-y-44 transition-all duration-700 shadow-2xl">
            <img id="player-thumb" src="" class="w-14 h-14 rounded-2xl object-cover border border-white/10">
            <div class="flex-1 overflow-hidden">
                <p id="player-title" class="text-xs font-bold truncate text-white">Select a track</p>
                <p id="player-artist" class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">RHK Premium</p>
            </div>
            <div class="flex items-center gap-5 pr-2">
                <button id="masterPlay" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-90 transition-all">
                    <i class="fa-solid fa-play text-lg"></i>
                </button>
                <button id="nextTrack" class="text-white/80 hover:text-white transition-colors">
                    <i class="fa-solid fa-forward-step text-xl"></i>
                </button>
            </div>
        </div>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[88%] h-20 bg-white/[0.03] backdrop-blur-3xl border border-white/10 rounded-[3rem] flex justify-around items-center px-8 z-50 shadow-2xl">
            <div class="nav-item active flex flex-col items-center gap-1"><i class="fa-solid fa-house text-xl"></i><span class="text-[8px] font-bold uppercase">Home</span></div>
            <div class="nav-item opacity-40 flex flex-col items-center gap-1"><i class="fa-solid fa-compass text-xl"></i><span class="text-[8px] font-bold uppercase">Explore</span></div>
            <div class="nav-item opacity-40 flex flex-col items-center gap-1"><i class="fa-solid fa-layer-group text-xl"></i><span class="text-[8px] font-bold uppercase">Library</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBND3n2ag9qGZG5SJPOKNVYr2dHNLwoD7Y",
            authDomain: "rhk-music-24bbc.firebaseapp.com",
            projectId: "rhk-music-24bbc",
            storageBucket: "rhk-music-24bbc.firebasestorage.app",
            messagingSenderId: "571438674805",
            appId: "1:571438674805:web:424f71af5a5e09b708193c",
            measurementId: "G-LBRD4QG87J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('user-avatar').style.backgroundImage = `url('${user.photoURL}')`;
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        document.getElementById('btnGoogle').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
