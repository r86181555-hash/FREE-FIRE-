<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK MUSIC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="profile">RH</div>
    <div>
        <small>Welcome</small><br>
        <b>RHK MUSIC</b>
    </div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search songs, artists..." onkeyup="debounceSearch()">
</div>

<!-- RESULTS -->
<div id="results" class="cards"></div>

<!-- MINI PLAYER -->
<div id="miniPlayer" class="mini-player" onclick="openPlayer()">
    <img id="miniImg">
    <div>
        <p id="miniTitle">Play something...</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
