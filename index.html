<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK | SINGULARITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Outfit:wght@100;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#000] text-white font-['Outfit'] overflow-hidden">

    <div id="core-bg"></div>
    <canvas id="particle-canvas"></canvas>

    <audio id="main-audio"></audio>

    <div class="relative z-10 h-screen flex flex-col items-center justify-center">
        
        <div class="fixed top-12 left-12 mix-blend-difference">
            <h1 class="font-['Major_Mono_Display'] text-2xl tracking-tighter">rhk_systm</h1>
            <p id="user-display" class="text-[8px] tracking-[0.8em] font-black uppercase mt-2 opacity-50">NODE_CONNECTED</p>
        </div>

        <div id="helix-container" class="absolute inset-0 flex items-center justify-center perspective-2000">
            </div>

        <div id="center-well" class="relative group cursor-pointer transition-all duration-1000 scale-75 opacity-20 hover:opacity-100">
            <div class="absolute inset-0 bg-[#1DB954] blur-[120px] rounded-full opacity-20 group-hover:opacity-40 transition-all animate-pulse"></div>
            
            <div class="relative z-20 w-80 h-80 rounded-full border border-white/10 p-2 flex items-center justify-center overflow-hidden bg-black/40 backdrop-blur-3xl">
                <img id="player-thumb" src="" class="absolute inset-0 w-full h-full object-cover opacity-30 transition-transform duration-[3s] group-hover:scale-125">
                
                <div class="text-center z-30 px-6">
                    <h2 id="player-title" class="text-3xl font-900 tracking-tighter leading-none mb-2">VOID</h2>
                    <p id="player-artist" class="text-[9px] font-black tracking-[0.4em] text-[#1DB954] uppercase">In_Standby</p>
                    
                    <div class="mt-8 flex items-center justify-center gap-6">
                        <button id="masterPlay" class="w-16 h-16 rounded-full border border-white/20 flex items-center justify-center hover:bg-white hover:text-black transition-all">
                            <i class="fa-solid fa-play ml-1"></i>
                        </button>
                    </div>
                </div>

                <svg class="absolute inset-0 w-full h-full -rotate-90">
                    <circle cx="160" cy="160" r="158" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                    <circle id="progress-circle" cx="160" cy="160" r="158" fill="none" stroke="#1DB954" stroke-width="2" stroke-dasharray="1000" stroke-dashoffset="1000"/>
                </svg>
            </div>
        </div>

        <div class="fixed bottom-12 flex gap-12 font-['Major_Mono_Display'] text-[10px] tracking-widest opacity-20 hover:opacity-100 transition-opacity">
            <span class="cursor-pointer" onclick="prevTrack()">prev_</span>
            <span class="cursor-pointer" onclick="nextTrack()">next_</span>
        </div>
    </div>

    <div id="name-modal" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center hidden">
        <div class="text-[10px] tracking-[2em] font-black opacity-10 mb-20">SINGULARITY_V1</div>
        <input type="text" id="userNameInput" placeholder="ENTER_USER_KEY" class="bg-transparent border-none text-center text-5xl font-900 tracking-tighter outline-none focus:placeholder-transparent uppercase italic">
        <div class="h-px w-24 bg-[#1DB954] mt-12 animate-width"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
