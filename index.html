<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK MUSIC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h2>🎵 RHK MUSIC</h2>
</div>

<input type="text" id="searchInput" placeholder="Search songs..." onkeyup="searchYouTube(this.value)">

<!-- OFFLINE PAGE -->
<div id="offline">
    <h3>📶 No Internet</h3>
    <p>Please turn on internet</p>
</div>

<!-- RESULTS -->
<div class="scroll" id="results"></div>

<!-- MINI PLAYER -->
<div id="miniPlayer" class="mini">
    <p id="miniTitle">No song</p>
    <button onclick="prev()">⏮</button>
    <button onclick="playPause()" id="playBtn">▶️</button>
    <button onclick="next()">⏭</button>
</div>

<!-- NAV -->
<div class="bottom-nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="focusSearch()">🔍</div>
    <div onclick="openFav()">❤️</div>
</div>

<script src="script.js"></script>
</body>
</html>
