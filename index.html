<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Free Fire</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
  flex-direction: column;
}

#percent {
  font-size: 30px;
  margin-top: 10px;
}

/* MAIN CONTENT */
#main {
  display: none;
  width: 100vw;
  height: 100vh;
  background: url('https://i.imgur.com/3ZQ3Z6Q.jpg') no-repeat center center/cover;
}

/* BUTTONS */
.btn-container {
  position: absolute;
  bottom: 50px;
  width: 100%;
  text-align: center;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: orange;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <h1>Loading...</h1>
  <div id="percent">0%</div>
</div>

<!-- MAIN UI -->
<div id="main">
  <div class="btn-container">
    <button onclick="alert('Login with Facebook')">Facebook</button>
    <button onclick="alert('Login as Guest')">Guest</button>
    <button onclick="alert('More Options')">More</button>
  </div>
</div>

<script>
let count = 0;
let percent = document.getElementById("percent");

let interval = setInterval(() => {
  count++;
  percent.innerText = count + "%";

  if (count >= 100) {
    clearInterval(interval);
    document.getElementById("loader").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}, 30);
</script>

</body>
</html>
