<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Style Clone</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* COMMON SCREEN */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ---------------- GARAGE INTRO ---------------- */
#intro {
  background: black;
  flex-direction: column;
}

svg {
  width: 140px;
  stroke: red;
  fill: none;
  stroke-width: 3;
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: draw 2.5s ease forwards;
  filter: drop-shadow(0 0 20px red);
}

.brand {
  color: red;
  font-size: 32px;
  margin-top: 10px;
  opacity: 0;
  animation: fadeIn 2s forwards;
  animation-delay: 2s;
}

@keyframes draw {
  to { stroke-dashoffset: 0; }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ---------------- LOADING SCREEN ---------------- */
#loading {
  display: none;
  flex-direction: column;
  background: radial-gradient(circle at center, #111, black);
}

.loading-text {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
}

.bar {
  width: 60%;
  height: 8px;
  background: #333;
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, red, orange);
  transition: width 1s ease;
}

/* ---------------- LOGIN SCREEN ---------------- */
#login {
  display: none;
  flex-direction: column;
  justify-content: flex-end;
  padding-bottom: 60px;
  background: linear-gradient(120deg, #0a0a0a, #1a1a1a);
}

/* Fake animated background */
.bg-effect {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,150,255,0.2), transparent);
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
  from { transform: translate(-25%, -25%); }
  to { transform: translate(0%, 0%); }
}

/* Buttons */
.btn {
  width: 250px;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

.fb {
  background: #1877f2;
  color: white;
}

.guest {
  background: #444;
  color: white;
}

.more {
  background: #222;
  color: white;
}

/* Horizontal feel */
@media (orientation: landscape) {
  .screen {
    flex-direction: row;
  }
}
</style>
</head>

<body>

<!-- 1️⃣ INTRO -->
<div id="intro" class="screen">
  <svg viewBox="0 0 100 100">
    <path d="M50 10 Q80 20 70 50 Q60 80 30 70 Q20 60 40 50 Q60 40 50 10"/>
  </svg>
  <div class="brand">GARENA</div>
</div>

<!-- 2️⃣ LOADING -->
<div id="loading" class="screen">
  <div>LOADING...</div>
  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
  <div class="loading-text" id="percent">0%</div>
</div>

<!-- 3️⃣ LOGIN -->
<div id="login" class="screen">
  <div class="bg-effect"></div>

  <button class="btn fb">Sign in with Facebook</button>
  <button class="btn guest">Guest</button>
  <button class="btn more">More</button>
</div>

<script>

// FLOW CONTROL
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("loading").style.display = "flex";
  startLoading();
}, 3500);

function startLoading() {
  let progress = 0;
  let bar = document.getElementById("progress");
  let text = document.getElementById("percent");

  let steps = [50, 75, 100];
  let i = 0;

  let interval = setInterval(() => {
    if (i < steps.length) {
      progress = steps[i];
      bar.style.width = progress + "%";
      text.innerText = progress + "%";
      i++;
    } else {
      clearInterval(interval);

      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("login").style.display = "flex";
      }, 800);
    }
  }, 1000);
}

</script>

</body>
</html>
