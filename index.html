<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #0a0a15, #000);
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
}

.header h2 {
    margin: 0;
}

/* SEARCH */
.search {
    margin-top: 10px;
}

.search input {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

/* SLIDER */
.slider {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.slide {
    min-width: 250px;
    background: rgba(255,255,255,0.08);
    padding: 10px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* MIXES */
.section {
    padding: 10px;
}

.grid {
    display: flex;
    overflow-x: auto;
    gap: 10px;
}

.card {
    min-width: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
    padding: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 60px;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    text-align: center;
}

/* NAVBAR */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(20,20,20,0.9);
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.nav button {
    background: none;
    border: none;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <h2>Good Morning 🔥</h2>

    <div class="search">
        <input type="text" id="search" placeholder="Search songs...">
    </div>
</div>

<!-- SLIDER -->
<div class="slider">
    <div class="slide">🎧 Trending</div>
    <div class="slide">🔥 Top Hits</div>
    <div class="slide">💜 New Songs</div>
</div>

<!-- MIXES -->
<div class="section">
    <h3>Your Mixes</h3>
    <div class="grid" id="musicList"></div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
    <p id="nowPlaying">No song playing</p>
    <button onclick="togglePlay()">⏯️ Play/Pause</button>
</div>

<!-- NAVBAR -->
<div class="nav">
    <button>🏠 Home</button>
    <button>🔍 Search</button>
    <button>📚 Library</button>
</div>

<script>
let totalSongs = 50;
let currentAudio = null;

function loadSongs() {
    let container = document.getElementById("musicList");

    for (let i = 1; i <= totalSongs; i++) {
        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="images/img${i}.jpg" onerror="this.src='https://via.placeholder.com/150'">
            <p>Song ${i}</p>
            <button onclick="playSong(${i})">Play</button>
        `;

        container.appendChild(card);
    }
}

function playSong(id) {
    if (currentAudio) currentAudio.pause();

    currentAudio = new Audio("songs/song" + id + ".mp3");
    currentAudio.play();

    document.getElementById("nowPlaying").innerText = "Playing Song " + id;
}

function togglePlay() {
    if (!currentAudio) return;

    if (currentAudio.paused) {
        currentAudio.play();
    } else {
        currentAudio.pause();
    }
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function() {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
});

loadSongs();
</script>

</body>
</html>
