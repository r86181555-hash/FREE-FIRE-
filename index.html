<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK ELITE | STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-['Outfit'] overflow-hidden">

    <audio id="main-audio"></audio>

    <div class="h-screen w-full flex flex-col relative z-10">
        <header class="p-6 flex justify-between items-center bg-[#050505]/80 backdrop-blur-md border-b border-white/5">
            <div>
                <h1 class="text-2xl font-900 tracking-tighter italic">RHK<span class="text-violet-500">.</span></h1>
                <p id="user-display" class="text-[8px] uppercase tracking-[0.4em] text-white/40">Premium Access</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                <i class="fa-solid fa-music text-violet-500 text-xs"></i>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-40">
            <div id="home-view">
                <div class="py-6">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-violet-400 mb-4">Studio Collection</h2>
                    <div id="home-grid" class="grid grid-cols-2 gap-5"></div>
                </div>
            </div>

            <div id="library-view" class="hidden py-6">
                <h2 class="text-3xl font-900 tracking-tighter mb-6">Your <span class="text-violet-500">Vault</span></h2>
                <div id="library-list" class="space-y-4"></div>
            </div>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[70%] h-16 bg-[#111]/80 backdrop-blur-2xl border border-white/10 rounded-full flex justify-around items-center z-40 shadow-2xl">
            <button onclick="showView('home')" id="btn-home" class="nav-btn active"><i class="fa-solid fa-grip-vertical"></i></button>
            <button onclick="showView('library')" id="btn-lib" class="nav-btn"><i class="fa-solid fa-heart"></i></button>
        </nav>
    </div>

    <div id="full-player" class="fixed inset-0 z-[100] bg-black translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.33,1,0.68,1)] flex flex-col">
        <div class="absolute inset-0 opacity-40 blur-[80px] scale-150" id="player-bg-blur"></div>
        
        <header class="relative p-8 flex justify-between">
            <button onclick="closePlayer()" class="text-2xl p-2"><i class="fa-solid fa-chevron-down"></i></button>
            <button id="big-save-btn" class="text-2xl p-2 transition-colors"><i class="fa-solid fa-heart"></i></button>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center px-10 relative">
            <div class="w-full aspect-square rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10 mb-12">
                <img id="big-thumb" src="" class="w-full h-full object-cover">
            </div>

            <div class="w-full mb-10">
                <h2 id="big-title" class="text-4xl font-900 tracking-tighter mb-1">Track</h2>
                <p id="big-artist" class="text-violet-400 font-bold tracking-[0.2em] uppercase text-[10px]">RHK Studio Production</p>
            </div>

            <div class="w-full mb-10">
                <div class="relative h-1.5 w-full bg-white/10 rounded-full cursor-pointer" id="progress-container">
                    <div id="progress-line" class="absolute h-full bg-white rounded-full transition-all duration-100"></div>
                </div>
                <div class="flex justify-between mt-3 text-[10px] font-bold text-white/30">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">0:00</span>
                </div>
            </div>

            <div class="w-full flex justify-around items-center">
                <button onclick="prevTrack()" class="text-4xl"><i class="fa-solid fa-backward-step"></i></button>
                <button id="masterPlay" class="w-24 h-24 bg-white rounded-full flex items-center justify-center text-black text-4xl shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button onclick="nextTrack()" class="text-4xl"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
