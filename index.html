<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK MUSIC</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #0a0a0a, #121212);
    color: white;
}

/* HEADER */
.header {
    padding: 18px;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* SEARCH */
.search-box {
    padding: 0 15px;
}

.search-box input {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: 1px solid #2a2a2a;
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 15px;
    backdrop-filter: blur(10px);
}

/* CATEGORY */
.categories {
    display: flex;
    overflow-x: auto;
    padding: 15px;
}

.categories button {
    margin-right: 10px;
    padding: 10px 18px;
    border-radius: 25px;
    border: 1px solid #333;
    background: #1c1c1c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.categories button.active,
.categories button:hover {
    background: #1db954;
    border: 1px solid #1db954;
}

/* SECTION */
.section {
    padding: 15px;
}

.section h2 {
    margin-bottom: 12px;
    font-size: 18px;
}

/* SONG LIST */
.song-list {
    display: flex;
    overflow-x: auto;
}

/* CARD */
.song-card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 10px;
    margin-right: 12px;
    min-width: 130px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    transition: 0.3s;
}

.song-card:hover {
    transform: scale(1.05);
    border-color: #1db954;
}

/* IMAGE */
.song-card img {
    width: 100%;
    border-radius: 12px;
}

/* TEXT */
.song-card p {
    margin-top: 8px;
    font-size: 14px;
}

/* FOOTER NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid #222;
}

.nav div {
    text-align: center;
    font-size: 14px;
    color: #aaa;
}

.nav div.active {
    color: #1db954;
}
</style>

</head>

<body>

<div class="header">🎵 RHK MUSIC</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="Search songs, artists...">
</div>

<!-- CATEGORY -->
<div class="categories">
    <button onclick="setCategory(this,'kannada')" class="active">Kannada</button>
    <button onclick="setCategory(this,'hindi')">Hindi</button>
    <button onclick="setCategory(this,'english')">English</button>
    <button onclick="setCategory(this,'other')">Others</button>
</div>

<!-- TRENDING -->
<div class="section">
    <h2>🔥 Trending</h2>
    <div class="song-list" id="songList">
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>Kantara Song</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>KGF Theme</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>Pushpa Song</p>
        </div>
    </div>
</div>

<!-- NEW -->
<div class="section">
    <h2>🆕 New Releases</h2>
    <div class="song-list">
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>New Hit 1</p>
        </div>
        <div class="song-card">
            <img src="https://via.placeholder.com/150">
            <p>New Hit 2</p>
        </div>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div class="active">🏠 Home</div>
    <div>🔍 Search</div>
    <div>📁 Library</div>
</div>

<script>
function setCategory(btn, category) {
    document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    let list = document.getElementById("songList");

    if (category === "kannada") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Kantara</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>KGF</p></div>`;
    }

    if (category === "hindi") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Hindi Hit</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Bollywood Song</p></div>`;
    }

    if (category === "english") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>English Pop</p></div>
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Top Charts</p></div>`;
    }

    if (category === "other") {
        list.innerHTML = `
        <div class="song-card"><img src="https://via.placeholder.com/150"><p>Other Mix</p></div>`;
    }
}
</script>

</body>
</html>
