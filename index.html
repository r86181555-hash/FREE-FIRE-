<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Entry</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* Fullscreen container */
.screen {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 8%;
}

/* Logo section */
.logo-box {
  display: flex;
  align-items: center;
  gap: 25px;
  opacity: 0;
  transform: translateX(-100px);
  animation: slideIn 2s ease forwards;
}

/* SVG logo */
svg {
  width: 120px;
  stroke: red;
  fill: none;
  stroke-width: 3;
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: draw 2.5s ease forwards;
  filter: drop-shadow(0 0 15px red);
}

/* Title text */
.title {
  color: red;
  font-size: 48px;
  letter-spacing: 5px;
  opacity: 0;
  animation: fadeText 2s ease forwards;
  animation-delay: 1.5s;
}

/* Background glow effect */
.glow-bg {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,0,0,0.4), transparent);
  top: 50%;
  left: 20%;
  transform: translate(-50%, -50%);
  filter: blur(80px);
}

/* Animations */
@keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

@keyframes slideIn {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes fadeText {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Exit animation */
.fade-out {
  animation: zoomOut 1s forwards;
}

@keyframes zoomOut {
  to {
    transform: scale(1.3);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="glow-bg"></div>

<div class="screen" id="main">
  <div class="logo-box">
    
    <!-- SVG Logo -->
    <svg viewBox="0 0 100 100">
      <path d="M50 10 
               Q80 20 70 50 
               Q60 80 30 70 
               Q20 60 40 50 
               Q60 40 50 10" />
    </svg>

    <!-- Title -->
    <div class="title">GARENA</div>

  </div>
</div>

<script>
// Exit animation
setTimeout(() => {
  document.getElementById("main").classList.add("fade-out");
}, 4000);

// Redirect
setTimeout(() => {
  window.location.href = "home.html"; // change later
}, 5000);
</script>

</body>
</html>
