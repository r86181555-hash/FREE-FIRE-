<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK MUSIC | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-['Montserrat'] overflow-x-hidden">

    <div id="auth-modal" class="fixed inset-0 z-[200] bg-[#050505] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="mb-10">
                <div class="w-20 h-20 bg-purple-600 rounded-[2rem] mx-auto flex items-center justify-center shadow-[0_0_30px_rgba(168,85,247,0.4)]">
                    <i class="fa-solid fa-bolt text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black mt-6 italic">RHK <span class="text-purple-500">MUSIC</span></h1>
                <p class="text-[9px] text-white/30 uppercase tracking-[0.4em] mt-2 font-bold">The Cloud Music Experience</p>
            </div>

            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="auth-input">
                <input type="password" id="password" placeholder="Password" class="auth-input">
                <button onclick="loginEmail()" class="w-full py-4 bg-purple-600 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Sign In</button>
                
                <div class="flex items-center gap-4 my-8 opacity-20">
                    <div class="h-[1px] flex-1 bg-white"></div>
                    <span class="text-[10px] font-bold">OR</span>
                    <div class="h-[1px] flex-1 bg-white"></div>
                </div>

                <button onclick="loginGoogle()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[11px] uppercase flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" class="w-4"> Google Login
                </button>
                
                <div id="phone-container" class="mt-4">
                    <input type="text" id="phone-number" placeholder="+1234567890" class="auth-input hidden mb-2">
                    <button id="phone-login-btn" onclick="showPhoneInput()" class="text-[10px] font-bold text-purple-400 uppercase tracking-widest hover:text-white transition-colors">Login with Phone</button>
                </div>
            </div>
            <div id="recaptcha-container"></div>
        </div>
    </div>

    <div id="app-content" class="max-w-md mx-auto min-h-screen relative pb-44 bg-gradient-to-b from-[#0a0a0f] to-black hidden">
        
        <header class="p-8 pb-4 sticky top-0 bg-[#0a0a0f]/90 backdrop-blur-2xl z-40">
            <div class="flex justify-between items-center mb-6">
                <div class="text-xl font-black italic tracking-tighter">RHK <span class="text-purple-500">MUSIC</span></div>
                <div class="flex items-center gap-3">
                    <span id="user-initials" class="w-8 h-8 rounded-full bg-purple-600/20 text-purple-400 flex items-center justify-center text-[10px] font-black border border-purple-500/30">U</span>
                </div>
            </div>

            <div id="home-filters" class="flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="filterGrid('all')" class="cat-chip active" id="f-all">Discovery</button>
                <button onclick="filterGrid('trending')" class="cat-chip" id="f-trending">Trending</button>
                <button onclick="filterGrid('recent')" class="cat-chip" id="f-recent">New Release</button>
            </div>
        </header>

        <main class="px-6">
            <section id="view-home" class="app-view">
                <h3 class="view-label">Top Studio Tracks</h3>
                <div id="track-grid" class="grid grid-cols-2 gap-4 pb-10"></div>
            </section>

            <section id="view-search" class="app-view hidden">
                <h3 class="view-label">Search Library</h3>
                <div class="relative mb-8">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 opacity-30 text-xs"></i>
                    <input type="text" id="searchInput" onkeyup="searchSongs()" placeholder="Search track name..." class="auth-input pl-12 bg-white/5 border-none">
                </div>
                <div id="search-results" class="grid grid-cols-2 gap-4"></div>
            </section>

            <section id="view-fav" class="app-view hidden">
                <h3 class="view-label">Liked Songs</h3>
                <div id="fav-grid" class="grid grid-cols-2 gap-4">
