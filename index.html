<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Entry</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
    }

    /* ROTATE PHONE MESSAGE */
    .rotate-msg{
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:18px;
      z-index:999;
    }

    @media (orientation: landscape){
      .rotate-msg{
        display:none;
      }
    }

    /* VIDEO SCREEN */
    .screen{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }
  </style>
</head>

<body>

  <div class="rotate-msg">Rotate your phone 📱</div>

  <!-- VIDEO -->
  <div class="screen">
    <video autoplay muted playsinline>
      <source src="VID_20250409_233027_1.mp4" type="video/mp4">
    </video>
  </div>

</body>
</html>
