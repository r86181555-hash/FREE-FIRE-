<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Entry</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
    }

    .rotate-msg{
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:18px;
      z-index:999;
    }

    @media (orientation: landscape){
      .rotate-msg{
        display:none;
      }
    }

    .screen{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }
  </style>
</head>

<body>

<div class="rotate-msg">Rotate your phone 📱</div>

<div class="screen">
  <video id="introVideo" muted playsinline loop>
    <source src="VID_20250409_233027_1.mp4" type="video/mp4">
  </video>
</div>

<script>
  const video = document.getElementById("introVideo");

  // Force autoplay
  window.addEventListener("load", () => {
    video.play().catch(() => {
      // If blocked, play on first touch
      document.body.addEventListener("click", () => {
        video.play();
      }, { once: true });
    });
  });
</script>

</body>
</html>
