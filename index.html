<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Style Entry</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* FORCE LANDSCAPE */
body{
  background:black;
  overflow:hidden;
}

/* MAIN CONTAINER */
.container{
  position:fixed;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* SCREEN STYLE */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.active{
  opacity:1;
  z-index:1;
}

/* IMAGE FIT LIKE GAME */
.screen img{
  width:100%;
  height:100%;
  object-fit:cover; /* fills horizontal */
}

/* LOADING TEXT */
.loading-text{
  position:absolute;
  bottom:8%;
  width:100%;
  text-align:center;
  color:white;
  font-size:14px;
}

/* PROGRESS BAR */
.progress-bar{
  position:absolute;
  bottom:4%;
  left:10%;
  width:80%;
  height:4px;
  background:rgba(255,255,255,0.2);
}

.progress{
  height:100%;
  width:0%;
  background:gold;
}

/* LOGIN */
.login-container{
  position:absolute;
  bottom:10%;
  width:100%;
  text-align:center;
}

.btn{
  display:inline-block;
  margin:8px;
  padding:10px 20px;
  border:none;
  border-radius:5px;
  font-size:14px;
}

.fb{
  background:#1877f2;
  color:white;
  width:70%;
}

.small-btn{
  width:30%;
  background:#ccc;
}

/* FORCE LANDSCAPE MESSAGE */
.rotate-msg{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  z-index:99;
}

@media screen and (orientation:landscape){
  .rotate-msg{
    display:none;
  }
}

</style>
</head>

<body>

<div class="rotate-msg">
  Please rotate your phone 📱
</div>

<div class="container">

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <img src="img1.png">
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <img src="img2.png">
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
  <img src="img3.png">

  <div class="loading-text" id="loadingText">Loading... 0%</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="screen4">
  <img src="img4.png">

  <div class="login-container">
    <button class="btn fb">Sign in with Facebook</button><br>
    <button class="btn small-btn">Guest</button>
    <button class="btn small-btn">More</button>
  </div>
</div>

</div>

<script>

let current = 1;

function nextScreen(){
  document.getElementById("screen"+current).classList.remove("active");
  current++;
  document.getElementById("screen"+current).classList.add("active");
}

/* TIMINGS */

// img1 → img2
setTimeout(nextScreen, 2000);

// img2 → img3
setTimeout(nextScreen, 4000);

/* LOADING */
let percent = 0;

let load = setInterval(()=>{
  percent++;

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("loadingText").innerText = "Loading... " + percent + "%";

  if(percent >= 100){
    clearInterval(load);

    setTimeout(nextScreen, 500);
  }

}, 40);

</script>

</body>
</html>
