<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK MUSIC</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bg-[#050505] text-white font-['Montserrat']">

<!-- 🔥 GOOGLE LOGIN SCREEN -->
<div id="google-login" style="
position:fixed;
inset:0;
background:black;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
">

<h1 style="margin-bottom:20px;">RHK MUSIC</h1>

<button onclick="googleLogin()" style="
padding:14px 20px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
">
Continue with Google
</button>

</div>

<!-- 🔥 YOUR ORIGINAL UI (UNCHANGED) -->
<div class="max-w-md mx-auto min-h-screen relative pb-44">

<header class="p-6">
<input type="text" id="searchInput" placeholder="Search..."
onkeyup="if(event.key==='Enter') searchMusic(this.value)"
class="w-full p-3 rounded-xl bg-black border">
</header>

<main class="p-4">
<div id="daily-mixes" class="flex gap-4 overflow-x-auto"></div>
</main>

<div id="player"></div>

<div id="mini-player">
<img id="player-thumb">
<p id="player-title"></p>
<i id="masterPlay" class="fa fa-play"></i>
</div>

</div>

<!-- 🔥 FIREBASE (MODULAR) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBND3n2ag9qGZG5SJPOKNVYr2dHNLwoD7Y",
authDomain: "rhk-music-24bbc.firebaseapp.com",
projectId: "rhk-music-24bbc",
storageBucket: "rhk-music-24bbc.firebasestorage.app",
messagingSenderId: "571438674805",
appId: "1:571438674805:web:424f71af5a5e09b708193c",
measurementId: "G-LBRD4QG87J"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.googleLogin = () => {
signInWithPopup(auth, provider)
.then((result)=> console.log(result.user))
.catch(err=>alert(err.message));
};

// SESSION
onAuthStateChanged(auth, (user)=>{
if(user){
document.getElementById("google-login").style.display="none";
}else{
document.getElementById("google-login").style.display="flex";
}
});

</script>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>

</body>
</html>
